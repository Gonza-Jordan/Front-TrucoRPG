@if (!uiService.esMultijugadorPhaser) {
  <main>
    <div class="connection-container">
      <app-connection-status></app-connection-status>
    </div>

    <div class="menu-wrapper">
      <img src="/Logo.png" alt="Truco y Maña" class="menu-logo" />

      <div class="contenedor-menu">
        <div class="menu-sep"></div>

        <a class="inactivo">
          <span>PARTIDA ESPECIAL</span>
        </a>

        <a (click)="irATradicional()" style="cursor: pointer">
          <span>PARTIDA TRADICIONAL</span>
        </a>

        <div class="menu-sep"></div>

        <a (click)="volver()" style="cursor: pointer">
          <span>VOLVER</span>
        </a>
      </div>
    </div>
  </main>
} @else {
  <div class="menu-wrapper">
    <img src="/Logo.png" alt="Truco y Maña" class="menu-logo" />

    <div class="contenedor-menu">
      <div class="menu-sep"></div>

      <a class="inactivo">
        <span>PARTIDA ESPECIAL</span>
      </a>

      <a (click)="irATradicional()" style="cursor: pointer">
        <span>PARTIDA TRADICIONAL</span>
      </a>
    </div>
  </div>
}

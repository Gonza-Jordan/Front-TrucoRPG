<app-page-wrapper>
    <div class="menu-wrapper">
        <div class="contenedor-menu">
            <h1 class="titulo">Valores de Cartas</h1>
            <div class="menu-sep"></div>
            <span class="icono-flecha izquierda" [class.deshabilitada]="indiceInicio === 0" (click)="anterior()">
              ❮
            </span>
            <div class="contenedor-cartas">
                @for (
                    carta of cartas.slice(indiceInicio, indiceInicio + cantPagina);
                    track $index
                  ) {
                    <div class="carta">
                      <img class="carta-img" [src]="cardImg(carta)" [alt]="carta.numero + ' de ' + carta.palo" />
                    </div>
                  }
            </div>
            <span class="icono-flecha derecha" [class.deshabilitada]="indiceInicio + cantPagina >= cartas.length" (click)="siguiente()">
                ❯
            </span>
          <div class="menu-sep"></div>
          <a routerLink="/tutorial"><span>VOLVER</span></a>
        </div>
    </div>
</app-page-wrapper>

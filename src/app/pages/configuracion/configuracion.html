
<app-page-wrapper>
  <app-card maxWidth="520px">
    <h1 class="titulo">CONFIGURACIÓN</h1>
    <div class="sep"></div>

    <div class="fila">
      <span class="label">Volumen</span>
      <input type="range" [(ngModel)]="volumen" min="0" max="100" (input)="onVolumenChange()" />
    </div>

    <div class="fila">
      <span class="label">Música</span>
      <select [(ngModel)]="musica" (change)="onMusicaChange()">
        <option [ngValue]="true">Activada</option>
        <option [ngValue]="false">Desactivada</option>
      </select>
    </div>

    <div class="fila">
      <span class="label">Delay de juego: {{ delaySegundos }}s</span>
      <input type="range" [(ngModel)]="delaySegundos" min="0" max="3" step="0.25" />
    </div>

    <div class="fila">
      <span class="label">Pantalla completa</span>
      <button class="toggle" (click)="pantallaCompleta = !pantallaCompleta">
        {{ pantallaCompleta ? 'SI' : 'NO' }}
      </button>
    </div>

    <div class="acciones">
      <button class="btn-guardar" (click)="guardar()">Guardar</button>
      <button class="btn-cancelar" (click)="cancelar()">Cancelar</button>
    </div>

  </app-card>
</app-page-wrapper>

<app-header></app-header>
<main>
  <div class="connection-container">
    <app-connection-status></app-connection-status>
  </div>
  <div class="menu-wrapper">
    <div class="contenedor-menu">

      <!-- Código de sala (solo si es creador o tiene código) -->
      @if (mode === 'crear') {
        <div class="codigo-sala-box">
          <h1 class="codigo-sala-title">Código de sala</h1>
          <div class="codigo-sala-value">{{ codigoSala || 'Generando...' }}</div>
          <button type="button" class="boton-copiar" (click)="copiarCodigo()" [disabled]="!codigoSala">
            {{ copiado ? '¡Copiado!' : 'Copiar código' }}
          </button>
        </div>
        <div class="menu-sep"></div>
      }

      <!-- Jugadores -->
      <div class="sala-grid-2">
        <!-- Yo -->
        <div class="sala-slot" [class.listo]="miListo">
          <span class="sala-avatar"></span>
          <span class="sala-label">Vos</span>
          @if (miListo) {
            <span class="check-listo">✓</span>
          }
        </div>

        <!-- Oponente -->
        <div class="sala-slot" [class.esperando]="!salaLista">
          <span class="sala-avatar" [class.avatar-dim]="!salaLista"></span>
          @if (salaLista) {
            <span class="sala-label">Oponente</span>
          } @else {
            <span class="sala-label esperando-txt">Esperando...</span>
          }
        </div>
      </div>

      @if (errorMsg) {
        <p class="error-msg">{{ errorMsg }}</p>
      }

      <div class="menu-sep"></div>

      <!-- Botón Comenzar -->
      @if (salaLista) {
        <button
          class="boton-comenzar"
          [class.listo]="miListo"
          (click)="comenzar()"
          [disabled]="miListo"
        >
          @if (miListo) {
            ✓ LISTO — Esperando oponente...
          } @else {
            COMENZAR
          }
        </button>
      } @else {
        <div class="esperando-sala">Esperando que se una un jugador...</div>
      }

      <a class="boton-abandonar" (click)="abandonar()">Abandonar Sala</a>
    </div>
  </div>
</main>
<app-footer></app-footer>

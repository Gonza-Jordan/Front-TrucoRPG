<app-page-wrapper>
  <app-card>
    <h1 class="titulo">NUEVA CONTRASEÑA</h1>
    <div class="sep"></div>

    @if (exito) {
      <div class="cartel cartel-exito">
        <span class="cartel-exito-icono">✔</span>
        <p class="cartel-exito-texto">¡Contraseña restablecida! Ya podés iniciar sesión.</p>
      </div>
      <button class="btn-submit" (click)="irAlLogin()">Ir al inicio de sesión</button>
    } @else if (error && !token) {
      <div class="cartel cartel-error">
        <span class="cartel-icono">!</span> {{ error }}
      </div>
    } @else {
      <div class="campo">
        <label>Nueva contraseña</label>
        <input type="password" [(ngModel)]="passwordNueva" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <div class="campo">
        <label>Confirmar contraseña</label>
        <input type="password" [(ngModel)]="passwordConfirmar" placeholder="••••••••" autocomplete="new-password"
          (keyup.enter)="resetear()" />
      </div>

      @if (error) {
        <div class="cartel cartel-error">
          <span class="cartel-icono">!</span> {{ error }}
        </div>
      }

      <button class="btn-submit" [disabled]="cargando" (click)="resetear()">
        {{ cargando ? 'Guardando...' : 'Confirmar nueva contraseña' }}
      </button>
    }

    <p class="registro-link">
      <a routerLink="/login">← Volver al inicio de sesión</a>
    </p>
  </app-card>
</app-page-wrapper>

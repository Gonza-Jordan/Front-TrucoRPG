<app-page-wrapper>
  <app-card>
    <h1 class="titulo">OLVIDÉ MI CONTRASEÑA</h1>
    <div class="sep"></div>

    @if (enviado) {
      <div class="cartel cartel-exito">
        <span class="cartel-exito-icono">✔</span>
        <p class="cartel-exito-texto">
          Si ese email está registrado, vas a recibir un link para restablecer tu contraseña. Revisá tu bandeja de entrada.
        </p>
      </div>
    } @else {
      <div class="campo">
        <label for="email">Email de tu cuenta</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="tu@email.com"
          (keyup.enter)="enviar()"
        />
        @if (error) {
          <div class="cartel cartel-error">
            <span class="cartel-icono">!</span> {{ error }}
          </div>
        }
      </div>

      <button class="btn-submit" [disabled]="cargando" (click)="enviar()">
        {{ cargando ? 'Enviando...' : 'Enviar link' }}
      </button>
    }

    <p class="registro-link">
      <a routerLink="/login">← Volver al inicio de sesión</a>
    </p>
  </app-card>
</app-page-wrapper>

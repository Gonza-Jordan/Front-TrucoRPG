
<app-page-wrapper>
  <app-card>
    <h1 class="titulo">INICIAR SESIÓN</h1>
    <div class="sep"></div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="campo">
        <label for="email">Ingresar Email:</label>
        <input id="email" type="email" formControlName="email" placeholder="tu@email.com" />
        <div class="cartel cartel-error" *ngIf="email.touched && email.errors?.['required']">
          <span class="cartel-icono">!</span> Campo obligatorio.
        </div>
        <div class="cartel cartel-error" *ngIf="email.touched && email.errors?.['email']">
          <span class="cartel-icono">!</span> Ingresá un email válido (ej: tu@email.com).
        </div>
      </div>

      <div class="campo">
        <label for="password">Ingresar Contraseña:</label>
        <input id="password" type="password" formControlName="password" placeholder="Tu contraseña" />
        <div class="cartel cartel-error" *ngIf="password.touched && password.errors?.['required']">
          <span class="cartel-icono">!</span> Campo obligatorio.
        </div>
      </div>

      <div class="cartel cartel-error error-servidor" *ngIf="errorServidor">
        <span class="cartel-icono">!</span> {{ errorServidor }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="form.invalid || cargando">
        {{ cargando ? 'Ingresando...' : 'Ingresar' }}
      </button>

    </form>

    <p class="registro-link">
      ¿No tenés cuenta? <a routerLink="/registro">Registrate</a>
    </p>
    <p class="registro-link">
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
    </p>
  </app-card>
</app-page-wrapper>

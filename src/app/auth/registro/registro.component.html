<div class="registro-wrapper">
  <div class="registro-card">
    <h1 class="titulo">TRUCO RPG</h1>
    <h2 class="subtitulo">Crear cuenta</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="campo">
        <label for="userName">Usuario</label>
        <input id="userName" type="text" formControlName="userName" placeholder="Tu nombre de aventurero" />
        <span class="error" *ngIf="userName.touched && userName.errors?.['required']">El usuario es obligatorio</span>
        <span class="error" *ngIf="userName.touched && userName.errors?.['minlength']">Mínimo 3 caracteres</span>
      </div>

      <div class="campo">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="tu@email.com" />
        <span class="error" *ngIf="email.touched && email.errors?.['required']">El email es obligatorio</span>
        <span class="error" *ngIf="email.touched && email.errors?.['email']">Email inválido</span>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
        <span class="error" *ngIf="password.touched && password.errors?.['required']">La contraseña es obligatoria</span>
        <span class="error" *ngIf="password.touched && password.errors?.['minlength']">Mínimo 6 caracteres</span>
      </div>

      <div class="campo">
        <label for="confirmarPassword">Confirmar contraseña</label>
        <input id="confirmarPassword" type="password" formControlName="confirmarPassword" placeholder="Repetí tu contraseña" />
        <span class="error" *ngIf="confirmarPassword.touched && confirmarPassword.errors?.['required']">Confirmá tu contraseña</span>
        <span class="error" *ngIf="confirmarPassword.touched && confirmarPassword.errors?.['noCoinciden']">Las contraseñas no coinciden</span>
      </div>

      <span class="error error-servidor" *ngIf="errorServidor">{{ errorServidor }}</span>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>

    </form>

    <p class="login-link">
      ¿Ya tenés cuenta? <a routerLink="/login">Iniciá sesión</a>
    </p>
  </div>
</div>

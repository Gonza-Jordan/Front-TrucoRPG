<app-header></app-header>
<app-page-wrapper>
  <app-card>
    <h1 class="titulo">REGISTRAR<br>USUARIO</h1>
    <div class="sep"></div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="campo">
        <label for="userName">Nombre de usuario:</label>
        <input id="userName" type="text" formControlName="userName" placeholder="Tu nombre" />
        <span class="error" *ngIf="userName.touched && userName.errors?.['required']">Campo obligatorio</span>
        <span class="error" *ngIf="userName.touched && userName.errors?.['minlength']">Mínimo 3 caracteres</span>
      </div>

      <div class="campo">
        <label for="email">Ingresar Email:</label>
        <input id="email" type="email" formControlName="email" placeholder="tu@email.com" />
        <span class="error" *ngIf="email.touched && email.errors?.['required']">Campo obligatorio</span>
        <span class="error" *ngIf="email.touched && email.errors?.['email']">Email inválido</span>
      </div>

      <div class="campo">
        <label for="password">Ingresar Contraseña:</label>
        <input id="password" type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
        <span class="error" *ngIf="password.touched && password.errors?.['required']">Campo obligatorio</span>
        <span class="error" *ngIf="password.touched && password.errors?.['minlength']">Mínimo 6 caracteres</span>
      </div>

      <div class="campo">
        <label for="confirmarPassword">Confirmar Contraseña:</label>
        <input id="confirmarPassword" type="password" formControlName="confirmarPassword" placeholder="Repetí tu contraseña" />
        <span class="error" *ngIf="confirmarPassword.touched && confirmarPassword.errors?.['required']">Campo obligatorio</span>
        <span class="error" *ngIf="confirmarPassword.touched && confirmarPassword.errors?.['noCoinciden']">No coinciden</span>
      </div>

      <span class="error error-servidor" *ngIf="errorServidor">{{ errorServidor }}</span>

      <button type="submit" class="btn-submit" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>

    </form>

    <p class="login-link">
      ¿Ya tenés cuenta? <a routerLink="/login">Iniciá sesión</a>
    </p>
  </app-card>
</app-page-wrapper>
<app-footer></app-footer>
